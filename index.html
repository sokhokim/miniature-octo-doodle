<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rest & Restore Therapy</title>

<link rel="icon" type="image/png" href="favicon.png">

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
body { margin:0; font-family:Inter, sans-serif; background:#f4f1ec; color:#4d453f;}
.container { width:min(1200px, calc(100% - 40px)); margin:auto;}

.nav { display:flex; justify-content:space-between; align-items:center; padding:20px 0;}
.logo { display:flex; align-items:center; gap:12px;}
.logo img { height:48px;}
.nav-links { display:flex; gap:28px; font-weight:600;}
.consult-btn { background:#8d6e63; color:#fff; padding:12px 20px; border-radius:999px;}

.hero { display:grid; grid-template-columns:40% 60%; height:420px; border-radius:24px; overflow:hidden; background:#f6f1eb;}
.hero-left { padding:40px; display:flex; flex-direction:column; justify-content:center;}
.hero-title { font-family:'Cormorant Garamond', serif; font-size:3.5rem;}
.hero-title span { color:#b9895c; font-style:italic;}
.hero-copy { margin:14px 0;}
.hero-btn { background:#8d6e63; color:#fff; padding:10px 18px; border-radius:999px; width:max-content;}

.hero-right {
background:
linear-gradient(90deg, rgba(244,237,227,.7), transparent),
url('https://images.unsplash.com/photo-1604881991720-f91add269bed?auto=format&fit=crop&w=1800&q=80') center/cover;
}
</style>
</head>

<body>

<div class="container">

<div class="nav">
  <div class="logo">
    <img src="logo.png">
    <div><strong>Rest & Restore Therapy</strong></div>
  </div>

  <div class="nav-links">
    <span>Home</span>
    <span>About</span>
    <span>Services</span>
    <span>Contact</span>
  </div>

  <div class="consult-btn">Book a Consultation</div>
</div>

<div class="hero">
  <div class="hero-left">
    <div class="hero-title">
      Therapy that helps you <span>rest & restore.</span>
    </div>
    <div class="hero-copy">
      Compassionate, personalized care to help you navigate life’s challenges.
    </div>
    <div class="hero-btn">Get Started</div>
  </div>
  <div class="hero-right"></div>
</div>

</div>

</body>
</html>
